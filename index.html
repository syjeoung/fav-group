<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    var internalUrl = "http://172.30.1.100/sy_fav_supabase_group/index.php";
    var externalUrl = "http://112.173.107.28:12345/sy_fav_supabase_group/index.php";
    var isRedirected = false;

    function redirectTo(url, reason) {
      if (!isRedirected) {
        isRedirected = true;
        console.log("[AutoRedirect] " + reason + " -> " + url);
        window.location.href = url;
      }
    }

    console.log("[AutoRedirect] Starting network detection...");
    console.log("[AutoRedirect] User Agent: " + navigator.userAgent);

    // 방법 1: Image 객체로 내부 서버 탐지 (가장 빠름, 내부망이면 10~50ms 내 응답)
    var img = new Image();
    img.onload = function() {
      console.log("[AutoRedirect] Image ping success -> INTERNAL");
      redirectTo(internalUrl, "Internal network detected (image ping success)");
    };
    img.onerror = function(e) {
      console.log("[AutoRedirect] Image ping failed (CORS or network error)");
    };

    // 방법 2: Fetch API로 no-cors 모드 탐지 (CORS 우회 시도)
    // 내부 서버에 HEAD 요청을 보내 응답 여부로 판단
    var controller = new AbortController();
    var fetchTimeout = setTimeout(function() {
      controller.abort();
    }, 800); // 0.8초 후 fetch 강제 중단

    fetch("http://172.30.1.100/ping.png", {
      method: "HEAD",
      mode: "no-cors",
      signal: controller.signal,
      cache: "no-store"
    }).then(function(response) {
      clearTimeout(fetchTimeout);
      console.log("[AutoRedirect] Fetch ping success -> INTERNAL");
      redirectTo(internalUrl, "Internal network detected (fetch ping success)");
    }).catch(function(error) {
      clearTimeout(fetchTimeout);
      console.log("[AutoRedirect] Fetch ping failed: " + error.message);
    });

    // 최종 타임아웃: 모든 탐지 방법이 실패하면 외부망으로 판단
    // 내부망이면 보통 0.1초 내에 응답, 외부망이면 즉시 실패하므로 1.5초면 충분
    setTimeout(function() {
      console.log("[AutoRedirect] Final timeout reached -> EXTERNAL");
      redirectTo(externalUrl, "Timeout (assumed external network)");
    }, 1500);

    // Image 객체로 내부 서버에 존재하는 작은 이미지 파일 요청
    var pingUrl = "http://172.30.1.100/ping.png?t=" + Date.now() + "&r=" + Math.random();
    console.log("[AutoRedirect] Requesting: " + pingUrl);
    img.src = pingUrl;
  </script>
</head>
<body>
  <p>네트워크 환경을 확인 중입니다... (최대 1.5초 소요)</p>
  <p>자동으로 이동하지 않으면 아래 링크를 선택하세요:</p>
  <a href="http://172.30.1.100/sy_fav_supabase_group/index.php">내부망 접속</a> |
  <a href="http://112.173.107.28:12345/sy_fav_supabase_group/index.php">외부망 접속</a>
  <hr>
  <p><strong>문제가 지속되면 다음을 확인해 보세요:</strong></p>
  <ul>
    <li>브라우저 캐시/히스토리를 삭제하고 다시 접속해 보세요.</li>
    <li>내부망에서 <a href="http://172.30.1.100/ping.png" target="_blank">http://172.30.1.100/ping.png</a> 에 직접 접속되는지 확인하세요.</li>
    <li>브라우저 개발자 도구(F12) → Console 탭에서 <code>[AutoRedirect]</code> 로그를 확인하세요.</li>
  </ul>
</body>
</html>
